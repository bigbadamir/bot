<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
*{font-family:Vazirmatn;text-align:center;box-sizing:border-box;}
body{margin:0;background:#0b1220;color:white;}

.sidebar{
position:fixed;right:0;top:0;width:220px;height:100%;
background:#111a2e;padding-top:20px;
}

.sidebar button{
width:90%;margin:10px;padding:12px;
background:#1e293b;color:white;border:none;border-radius:10px;
}

.main{margin-right:230px;padding:20px;}

.card{
background:#111a2e;padding:20px;margin:20px auto;
border-radius:15px;max-width:700px;
}

input,textarea,select{
width:90%;padding:10px;margin:5px;
background:#1e293b;color:white;border:none;border-radius:10px;
}

button{
padding:10px 15px;background:#3b82f6;
border:none;border-radius:10px;color:white;margin:5px;
cursor:pointer;
}

.mission,.msg{
background:#0f172a;padding:15px;margin:10px auto;
border-radius:12px;max-width:650px;
word-break:break-word;
}

.page{display:none;}

.switch input{display:none;}
.switch span{
width:50px;height:24px;background:#ccc;
display:inline-block;border-radius:24px;position:relative;
}
.switch span::after{
content:"";width:20px;height:20px;background:white;
position:absolute;top:2px;right:2px;border-radius:50%;
transition:.3s;
}
.switch input:checked + span{background:#22c55e;}
.switch input:checked + span::after{right:28px;}

.emoji-picker{
position:fixed;
bottom:90px;
right:260px;
background:#1e293b;
padding:10px;
border-radius:12px;
width:260px;
height:200px;
overflow:auto;
display:none;
z-index:999;
}

.emoji-picker span{
cursor:pointer;
font-size:20px;
padding:5px;
display:inline-block;
}

.toolbar button{
background:#1e293b;
border:none;
padding:8px 10px;
margin:3px;
border-radius:8px;
color:white;
}

#popup{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#111a2e;
padding:20px;
border-radius:15px;
display:none;
z-index:9999;
max-width:420px;
width:90%;
}

a{color:#60a5fa;text-decoration:none;}
small{color:#cbd5e1;}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('missions')">🎯 ماموریت‌ها</button>
<button onclick="show('missionList')">📋 لیست ماموریت‌ها</button>
<button onclick="show('users')">👥 کاربران</button>
<button onclick="show('messages')">📢 پیام‌ها</button>
<button onclick="show('msglist')">📩 لیست پیام‌ها</button>
</div>

<div class="main">

<div id="missions" class="page">
  <div class="card">
    <input id="title" placeholder="عنوان">
    <input id="desc" placeholder="توضیح">
    <input id="link" placeholder="لینک">
    <input id="points" placeholder="امتیاز">
    <select id="type">
      <option value="main">Main</option>
      <option value="side">Side</option>
    </select>
    <button onclick="addMission()">ساخت</button>
  </div>
</div>

<div id="missionList" class="page"></div>

<div id="users" class="page">
  <div class="card">
    <button onclick="loadUsers()">لود کاربران</button>
    <div id="userList"></div>
  </div>
</div>

<div id="messages" class="page">
  <div class="card">
    <h3>📢 ارسال پیام</h3>

    <div class="toolbar">
      <button onclick="execCmd('bold')"><b>B</b></button>
      <button onclick="execCmd('italic')"><i>I</i></button>
      <button onclick="createLink()">🔗 لینک</button>
      <button onclick="toggleEmoji()">😊 ایموجی</button>
    </div>

    <div id="editor" contenteditable="true"
    style="background:#1e293b;padding:10px;border-radius:10px;min-height:120px;"></div>

    <input type="file" id="file">
    <input id="btnText" placeholder="متن دکمه">
    <input id="btnLink" placeholder="لینک دکمه">
    <input id="schedule" placeholder="زمان ارسال">

    <button onclick="sendMsg()">ارسال</button>

    <div id="preview"></div>
  </div>
</div>

<div id="msglist" class="page">
  <div class="card"><h3>📩 لیست پیام‌ها</h3></div>
  <div id="msgList"></div>
</div>

</div>

<div id="emojiBox" class="emoji-picker"></div>

<div id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">تایید</button>
</div>

<script>
function show(p){
  document.querySelectorAll('.page').forEach(e=>e.style.display='none');
  document.getElementById(p).style.display='block';

  if(p==='missionList') loadMissions();
  if(p==='msglist') loadMessages();
}

/* EMOJI */
const emojis=["😀","😁","😂","🤣","😃","😄","😅","😆","😉","😊","😍","😘","😎","🤩","🥳","😡","😱","👍","👎","🙏","🔥","💯","🎉","❤️","✨","🚀","📱","💳","💰"];

function toggleEmoji(){
  let box=document.getElementById("emojiBox");
  if(box.style.display==="block"){box.style.display="none";return;}
  box.innerHTML="";
  emojis.forEach(e=>{
    let s=document.createElement("span");
    s.innerText=e;
    s.onclick=()=>document.execCommand("insertText",false,e);
    box.appendChild(s);
  });
  box.style.display="block";
}

function execCmd(cmd){
  document.getElementById("editor").focus();
  document.execCommand(cmd,false,null);
}

function createLink(){
  let url=prompt("لینک:");
  if(url) document.execCommand("createLink",false,url);
}

/* POPUP */
let popupAction=null;

function showPopup(msg, action=null){
  document.getElementById("popupText").innerHTML=msg;
  document.getElementById("popup").style.display="block";
  popupAction=action;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  if(popupAction){popupAction();popupAction=null;}
}

/* =========================
   MISSIONS
========================= */
async function loadMissions(){
  const box=document.getElementById("missionList");
  box.innerHTML="⏳ در حال دریافت...";

  try{
    const r = await fetch('/admin/missions', { cache: 'no-store' });
    if(!r.ok) throw new Error("HTTP " + r.status);

    const data = await r.json();

    if(!Array.isArray(data)){
      box.innerHTML="❌ داده اشتباه از سرور";
      return;
    }

    if(data.length===0){
      box.innerHTML="⚠️ هیچ ماموریتی وجود ندارد";
      return;
    }

    let html="";

    data.forEach(m=>{
      html += `
      <div class="mission">
        <h3>${m.title || "-"}</h3>
        <p>${m.desc || "-"}</p>
        <p><small>امتیاز: ${m.points ?? 0}</small></p>
        <p><small>نوع: ${m.type || "-"}</small></p>
        <p><small>وضعیت: ${m.status || "-"}</small></p>
        <p><small>لینک ذخیره‌شده:</small><br><a href="${m.link || '#'}" target="_blank">${m.link || "-"}</a></p>

        <label class="switch">
          <input type="checkbox" ${m.status==="active"?"checked":""}
          onchange="toggleMission('${m.id}',this.checked)">
          <span></span>
        </label>

        <button onclick="deleteMission('${m.id}')">🗑 حذف</button>
      </div>`;
    });

    box.innerHTML = html;
  }catch(err){
    console.error(err);
    box.innerHTML="❌ خطا در دریافت ماموریت‌ها";
  }
}

async function addMission(){
  const payload = {
    title: document.getElementById("title").value.trim(),
    desc: document.getElementById("desc").value.trim(),
    link: document.getElementById("link").value.trim(),
    points: document.getElementById("points").value.trim(),
    type: document.getElementById("type").value
  };

  if(!payload.title || !payload.link){
    showPopup("❌ عنوان و لینک اجباری هستند");
    return;
  }

  try{
    const r = await fetch('/admin/add-mission', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    const res = await r.json();

    if(!res.ok){
      showPopup("❌ خطا در ساخت ماموریت");
      return;
    }

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("link").value = "";
    document.getElementById("points").value = "";

    show('missionList');
    await loadMissions();
    showPopup("✅ ماموریت ساخته شد");
  }catch(err){
    console.error(err);
    showPopup("❌ خطا در ساخت ماموریت");
  }
}

async function deleteMission(id){
  try{
    await fetch('/admin/delete-mission',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id})
    });
    loadMissions();
  }catch(err){
    console.error(err);
    showPopup("❌ خطا در حذف");
  }
}

async function toggleMission(id,state){
  try{
    await fetch('/admin/mission/toggle',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,status:state?"active":"inactive"})
    });
    loadMissions();
  }catch(err){
    console.error(err);
    showPopup("❌ خطا در تغییر وضعیت");
  }
}

/* USERS */
async function loadUsers(){
  try{
    const r = await fetch('/admin/users', { cache: 'no-store' });
    const data = await r.json();

    let html = "";
    Object.keys(data).forEach(id=>{
      html += `<div class="mission">${id}</div>`;
    });

    document.getElementById("userList").innerHTML = html || "کاربری وجود ندارد";
  }catch(err){
    console.error(err);
    document.getElementById("userList").innerHTML = "❌ خطا در دریافت کاربران";
  }
}

/* MESSAGES */
async function loadMessages(){
  try{
    const r = await fetch('/admin/messages', { cache: 'no-store' });
    const data = await r.json();

    let html = "";
    data.forEach(m=>{
      html += `<div class="msg">${m.text}</div>`;
    });

    document.getElementById("msgList").innerHTML = html || "پیامی وجود ندارد";
  }catch(err){
    console.error(err);
    document.getElementById("msgList").innerHTML = "❌ خطا در دریافت پیام‌ها";
  }
}

async function sendMsg(){
  const text = document.getElementById("editor").innerHTML.trim();

  try{
    await fetch('/admin/broadcast',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });

    showPopup("📩 ارسال شد");
  }catch(err){
    console.error(err);
    showPopup("❌ خطا در ارسال");
  }
}

/* INIT */
show('missions');
loadUsers();
</script>

</body>
</html>
